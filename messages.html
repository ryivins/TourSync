<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Messages</title>

  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>

<header class="topbar">
  <h1>TourSync</h1>

  <nav>
    <a href="index.html">Dashboard</a>
    <a href="schedule.html">Schedule</a>
    <a href="tasks.html">Tasks</a>
    <a href="contacts.html">Contacts</a>
    <a href="messages.html">Messages</a>
  </nav>
</header>

<main class="chat-layout">

  <!-- =========================
       SIDEBAR
  ========================== -->
  <aside class="chat-sidebar">

    <h3>Chats</h3>

    <input
      id="userSearch"
      placeholder="Search contacts..."
      onkeyup="renderUsers(this.value)"
    >

    <div class="group-create">
      <input id="groupName" placeholder="Group name...">
      <button onclick="createGroupChat()">+ Group Chat</button>
    </div>

    <ul id="userList"></ul>

  </aside>

  <!-- =========================
       CHAT WINDOW
  ========================== -->
  <section class="chat-window">

    <div class="chat-header">
      <h3 id="chatTitle">Select a contact</h3>
    </div>

    <!-- CONTACT SELECTOR (PHONE BASED) -->
    <div class="card" style="margin:10px; padding:10px;">

      <label><strong>Send To:</strong></label>

      <select id="messageRecipient">
        <option value="">Select contact</option>
      </select>

    </div>

    <!-- MESSAGES -->
    <ul id="messageList"></ul>

    <!-- INPUT -->
    <div class="message-box">

      <input
        id="messageInput"
        placeholder="Type your message..."
      >

      <button onclick="sendMessage()">
        Send
      </button>

    </div>

  </section>

</main>

</body>
</html>
