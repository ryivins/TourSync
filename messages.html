<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Messages</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>

<header class="topbar">
  <h1>TourSync</h1>
  <nav>
    <a href="index.html">Dashboard</a>
    <a href="schedule.html">Schedule</a>
    <a href="tasks.html">Tasks</a>
    <a href="contacts.html">Contacts</a>
    <a href="messages.html">Messages</a>
  </nav>
</header>

<main class="container">

  <div class="messages-layout">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar">

      <div class="card">
        <h3>Create Profile</h3>
        <input id="name" placeholder="Name">
        <input id="username" placeholder="Username">
        <button onclick="createUser()">Create / Switch</button>
      </div>

      <input id="search" placeholder="Search users..." onkeyup="renderUsers(this.value)">

      <ul id="userList"></ul>

    </div>

    <!-- CHAT AREA -->
    <div class="chat">

      <div class="card chat-header">
        <h3 id="chatTitle">Select a user</h3>
      </div>

      <ul id="messageList" class="message-list"></ul>

      <div class="message-box">
        <input id="messageInput" placeholder="Type message...">
        <button onclick="sendMessage()">Send</button>
      </div>

    </div>

  </div>

</main>

</body>
</html>
