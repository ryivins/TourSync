<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Messages</title>

  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>

<header class="topbar">
  <h1>TourSync</h1>

  <nav>
    <a href="index.html">Dashboard</a>
    <a href="schedule.html">Schedule</a>
    <a href="tasks.html">Tasks</a>
    <a href="contacts.html">Contacts</a>
    <a href="messages.html">Messages</a>
  </nav>
</header>

<main class="container">

  <h2>Messages</h2>

  <!-- =========================
       CONTACT SEARCH
  ========================== -->
  <div class="card" style="margin-bottom:15px; padding:12px;">

    <h3>Select Contact</h3>

    <input
      id="contactSearch"
      type="text"
      placeholder="Search contacts..."
      oninput="renderContactPicker()"
    >

    <ul id="contactPicker"></ul>

  </div>

  <!-- =========================
       CHAT WINDOW
  ========================== -->
  <div class="card" style="padding:12px;">

    <!-- CHAT HEADER -->
    <h3 id="chatTitle">No contact selected</h3>

    <!-- UNREAD STATUS -->
    <div id="chatStatus" style="font-size:12px; opacity:0.7; margin-bottom:8px;"></div>

    <!-- MESSAGE LIST (BUBBLES) -->
    <ul id="messageList" class="chat-messages"></ul>

    <!-- INPUT -->
    <div class="message-box" style="margin-top:10px; display:flex; gap:8px;">

      <input
        id="messageInput"
        type="text"
        placeholder="Type your message..."
        style="flex:1;"
      >

      <button onclick="sendMessage()">
        Send
      </button>

    </div>

  </div>

</main>

</body>
</html>
