<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Messages</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>

<header class="topbar">
  <h1>𝔗𝔬𝔲𝔯𝔖𝔶𝔫𝔠</h1>

  <nav>
    <a href="index.html">𝐃𝐚𝐬𝐡𝐛𝐨𝐚𝐫𝐝</a>
    <a href="schedule.html">𝐒𝐜𝐡𝐞𝐝𝐮𝐥𝐞</a>
    <a href="tasks.html">𝐓𝐚𝐬𝐤𝐬</a>
    <a href="contacts.html">𝐂𝐨𝐧𝐭𝐚𝐜𝐭𝐬</a>
    <a href="messages.html">𝐌𝐞𝐬𝐬𝐚𝐠𝐞𝐬</a>
  </nav>
</header>

<main class="chat-layout">

  <!-- SIDEBAR -->
  <aside class="chat-sidebar">

    <h3>Users</h3>

    <!-- CREATE PROFILE -->
    <div class="profile-box">
      <input id="name" placeholder="Name">
      <input id="username" placeholder="Username">
      <button onclick="createUser()">Create Profile</button>
    </div>

    <!-- SEARCH USERS -->
    <input
      id="userSearch"
      placeholder="Search users..."
      onkeyup="renderUsers(this.value)"
    >

    <!-- USER LIST -->
    <ul id="userList"></ul>

  </aside>

  <!-- CHAT WINDOW -->
  <section class="chat-window">

    <!-- HEADER -->
    <div class="chat-header">
      <h3 id="chatTitle">Select a conversation</h3>
    </div>

    <!-- MESSAGES -->
    <ul id="messageList"></ul>

    <!-- INPUT -->
    <div class="chat-input">
      <input id="messageInput" placeholder="Type your message...">
      <button onclick="sendMessage()">Send</button>
    </div>

  </section>

</main>

</body>
</html>
