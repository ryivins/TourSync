<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Messages</title>

  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>

<header class="topbar">

  <h1>TourSync</h1>

  <nav>
    <a href="index.html">Dashboard</a>
    <a href="schedule.html">Schedule</a>
    <a href="tasks.html">Tasks</a>
    <a href="contacts.html">Contacts</a>
    <a href="messages.html">Messages</a>
  </nav>

  <button class="logout-btn" onclick="logout()">Logout</button>

</header>

<main class="container messages-layout">

  <!-- LEFT: CHAT LIST -->
  <aside class="messages-left">

    <div class="page-header">
      <h2>Messages</h2>
      <p class="subtitle">Team communication</p>
    </div>

    <input id="userSearch" class="input"
      placeholder="Search people..."
      onkeyup="renderUsers(this.value)">

    <div class="group-create">
      <input id="groupName" class="input" placeholder="Group name...">
      <button class="btn btn-primary" onclick="createGroupChat()">
        + Group Chat
      </button>
    </div>

    <ul id="userList"></ul>

  </aside>

  <!-- RIGHT: CHAT WINDOW -->
  <section class="messages-right">

    <div class="chat-header">
      <h3 id="chatTitle">Select a conversation</h3>
    </div>

    <ul id="messageList"></ul>

    <div class="message-box">

     <input id="messageInput" class="input" placeholder="Type your message...">

      <button class="btn btn-primary" onclick="sendMessage()">
        Send
      </button>

    </div>

  </section>

</main>

</body>
</html>
