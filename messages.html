<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Messages</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="users.js"></script>
  <script defer src="messages.js"></script>
</head>

<body>

<header class="topbar">
  <h1>TourSync</h1>
  <nav>
    <a href="index.html">Dashboard</a>
    <a href="schedule.html">Schedule</a>
    <a href="tasks.html">Tasks</a>
    <a href="contacts.html">Contacts</a>
    <a href="messages.html">Messages</a>
  </nav>
</header>

<main class="container">

  <h2>Team Messaging System</h2>

  <!-- PROFILE CREATION -->
  <div class="card">
    <input id="name" placeholder="Name">
    <input id="username" placeholder="Username">
    <button onclick="createUser()">Create Profile</button>
  </div>

  <!-- SEARCH -->
  <input id="search" placeholder="Search users..." onkeyup="renderUsers(this.value)">

  <!-- USER LIST -->
  <ul id="userList"></ul>

  <!-- CHAT AREA -->
  <div class="card">
    <h3 id="chatTitle">Select a user to chat</h3>

    <ul id="messageList"></ul>

    <div class="message-box">
      <input id="messageInput" placeholder="Type message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</main>

</body>
</html>
