<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Messages</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>

<header class="topbar">
  <h1>TourSync</h1>

  <nav>
    <a href="index.html">Dashboard</a>
    <a href="schedule.html">Schedule</a>
    <a href="tasks.html">Tasks</a>
    <a href="contacts.html">Contacts</a>
    <a href="messages.html">Messages</a>
  </nav>
</header>

<main class="chat-layout">

  <!-- =========================
       SIDEBAR
  ========================== -->
  <aside class="chat-sidebar">

    <!-- HAMBURGER (for future toggle) -->
    <div class="sidebar-top">
      <button class="hamburger">☰</button>
      <h3>Chats</h3>
    </div>

    <!-- SEARCH PEOPLE -->
    <input
      id="userSearch"
      placeholder="Search people..."
      onkeyup="renderUsers(this.value)"
    >

    <!-- CREATE GROUP CHAT -->
    <div class="group-create">
      <input id="groupName" placeholder="Group name...">
      <button onclick="createGroupChat()">+ Group Chat</button>
    </div>

    <!-- USER / CHAT LIST -->
    <ul id="userList"></ul>

    <!-- DEMO CONTACTS (STATIC) -->
<li onclick="openChat('alex')">
  <strong>Matt Klein</strong><br>
  <small>Hey, are we still meeting?</small>
</li>

<li onclick="openChat('sarah')">
  <strong>Sidney Castillo</strong><br>
  <small>Got the schedule 👍</small>
</li>

<li onclick="openChat('jordan')">
  <strong>Jonah Payne</strong><br>
  <small>I'll check it out</small>
</li>

<li onclick="openGroupChat('tour-group')">
  <strong>Aneurysm Tour</strong><br>
  <small>Matt, Sidney, Jonah</small>
</li>

  </aside>

  <!-- =========================
       CHAT WINDOW
  ========================== -->
  <section class="chat-window">

    <!-- CHAT HEADER -->
    <div class="chat-header">
      <h3 id="chatTitle">Select a user</h3>
    </div>

    <!-- CHAT MESSAGES -->
    <ul id="messageList"></ul>

    <!-- MESSAGE INPUT -->
    <div class="message-box">
      <input id="messageInput" placeholder="Type your message...">
      <button onclick="sendMessage()">Send</button>
    </div>

  </section>

</main>

</body>
</html>
