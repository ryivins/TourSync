<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>TourSync Dashboard</title>

  <link rel="stylesheet" href="style.css">

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <!-- Your JS -->
  <script defer src="script.js"></script>

  <!-- LOGIN GUARD -->
  <script>
    const user = localStorage.getItem("tourUser");

    if (!user) {
      window.location.href = "login.html";
    }
  </script>
</head>

<body>

<!-- =========================
     TOP BAR
========================= -->
<header class="topbar">
  <h1>TourSync</h1>

  <nav>
    <a href="index.html">Dashboard</a>
    <a href="schedule.html">Schedule</a>
    <a href="tasks.html">Tasks</a>
    <a href="contacts.html">Contacts</a>
    <a href="messages.html">Messages</a>
  </nav>

  <button onclick="logout()">Logout</button>
</header>

<!-- =========================
     DASHBOARD
========================= -->
<main class="container">

  <h2>Dashboard</h2>
  <p id="welcome"></p>

  <!-- TODAY SUMMARY -->
  <div class="card today-summary">

    <h3>Today</h3>

    <div class="today-summary-item">
      <span>Events</span>
      <span id="todayEvents">0</span>
    </div>

    <div class="today-summary-item">
      <span>Tasks Due</span>
      <span id="todayTasks">0</span>
    </div>

  </div>

  <!-- GRID -->
  <div class="grid">

    <!-- NEXT EVENT -->
    <div class="card" data-link="schedule.html">
      <h3>Next Event</h3>
      <div id="nextEvent">Loading...</div>
    </div>

    <!-- TASKS -->
    <div class="card" data-link="tasks.html">
      <h3>Tasks</h3>
      <div id="taskSummary">Loading...</div>
    </div>

    <!-- CONTACTS -->
    <div class="card" data-link="contacts.html">
      <h3>Contacts</h3>
      <div id="contactSummary">Loading...</div>
    </div>

    <!-- QUICK ACTIONS (NO NAV LINK) -->
    <div class="card">

      <h3>Quick Actions</h3>

      <button onclick="location.href='schedule.html'">
        Add Event
      </button>

      <button onclick="location.href='tasks.html'">
        Add Task
      </button>

      <button onclick="location.href='contacts.html'">
        Add Contact
      </button>

    </div>

  </div>

  <!-- TOUR SCHEDULER -->
  <div class="card">

    <h3>Schedule Tour Event</h3>

    <input id="tourName" type="text" placeholder="Artist / Manager Name">
    <input id="tourEmail" type="email" placeholder="Email">
    <input id="tourVenue" type="text" placeholder="Venue Name">

    <input id="tourDate" type="date">
    <input id="tourTime" type="time">

    <button onclick="scheduleTour()">
      Schedule Event
    </button>

  </div>

  <!-- UPCOMING TOURS -->
  <div class="card">

    <h3>Upcoming Tour Events</h3>

    <ul id="tourList"></ul>

  </div>

</main>

<!-- =========================
     PAGE SCRIPT (NAVIGATION FIX)
========================= -->
<script>

  /* =========================
     USER
  ========================= */

  const userName = localStorage.getItem("tourUser");

  document.getElementById("welcome").innerText =
    "Welcome, " + userName;

  function logout() {
    localStorage.removeItem("tourUser");
    window.location.href = "login.html";
  }

  /* =========================
     LOAD FUNCTIONS
  ========================= */

  function loadNextEvent() {
    let events =
      JSON.parse(localStorage.getItem("tours")) || [];

    if (events.length === 0) {
      document.getElementById("nextEvent").innerText =
        "No events yet";
      return;
    }

    events.sort((a, b) =>
      new Date(a.date) - new Date(b.date)
    );

    const next = events[0];

    document.getElementById("nextEvent").innerHTML = `
      <strong>${next.date}</strong><br>
      ${next.time || ""}<br>
      ${next.venue || ""}
    `;
  }

  function loadTasks() {
    let tasks =
      JSON.parse(localStorage.getItem("tasks")) || [];

    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;

    document.getElementById("taskSummary").innerHTML =
      `${done}/${total} completed`;
  }

  function loadContacts() {
    let contacts =
      JSON.parse(localStorage.getItem("contacts")) || [];

    document.getElementById("contactSummary").innerHTML =
      `${contacts.length} saved contacts`;
  }

  function loadTodaySummary() {
    let events =
      JSON.parse(localStorage.getItem("tours")) || [];

    let tasks =
      JSON.parse(localStorage.getItem("tasks")) || [];

    const today =
      new Date().toISOString().split("T")[0];

    const todayEvents =
      events.filter(e => e.date === today).length;

    const todayTasks =
      tasks.filter(t => !t.done).length;

    document.getElementById("todayEvents").innerText =
      todayEvents;

    document.getElementById("todayTasks").innerText =
      todayTasks;
  }

  /* =========================
     CARD CLICK NAVIGATION
  ========================= */

  document.querySelectorAll(".card[data-link]").forEach(card => {
    card.addEventListener("click", () => {
      window.location.href = card.dataset.link;
    });
  });

  document.querySelectorAll(".card button").forEach(button => {
    button.addEventListener("click", (e) => {
      e.stopPropagation();
    });
  });

  /* =========================
     INIT
  ========================= */

  loadNextEvent();
  loadTasks();
  loadContacts();
  loadTodaySummary();

</script>

</body>
</html>
