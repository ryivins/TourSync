<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>TourSync Dashboard</title>

  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>

  <div class="dashboard-grid">

  <div class="card">
    ...
  </div>

  <div class="card">
    ...
  </div>

</div>

<header class="topbar">

  <h1>TourSync</h1>

  <nav>
    <a href="index.html">Dashboard</a>
    <a href="schedule.html">Schedule</a>
    <a href="tasks.html">Tasks</a>
    <a href="contacts.html">Contacts</a>
    <a href="messages.html">Messages</a>
  </nav>

  <button class="logout-btn" onclick="logout()">Logout</button>

</header>

<main class="container">

  <!-- WELCOME -->
  <div class="card">
    <h2>Dashboard</h2>
    <p>Live overview of your tour activity</p>
  </div>

  <!-- TASK STATS -->
  <div class="card">
    <h3>Task Overview</h3>

    <p>High Priority: <span id="statHigh">0</span></p>
    <p>Medium Priority: <span id="statMedium">0</span></p>
    <p>Low Priority: <span id="statLow">0</span></p>
  </div>

  <!-- UPCOMING TASKS -->
  <div class="card">
    <h3>Upcoming Tasks</h3>

    <ul id="taskList"></ul>
  </div>

  <!-- CONTACT COUNT -->
  <div class="card">
    <h3>Contacts</h3>

    <p>Total Contacts: <span id="contactCount">0</span></p>
  </div>

</main>

<script>
window.addEventListener("load", () => {
  const contacts = getContacts();

  const count = document.getElementById("contactCount");

  if (count) {
    count.textContent = contacts.length;
  }
});
</script>

</body>
</html>
