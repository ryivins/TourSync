<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Schedule</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <h1>TourSync</h1>
  <nav>
    <a href="index.html">Dashboard</a>
    <a href="schedule.html">Schedule</a>
    <a href="tasks.html">Tasks</a>
    <a href="contacts.html">Contacts</a>
    <a href="messages.html">Messages</a>
  </nav>
</header>

<main class="container">

  <h2>Tour Schedule</h2>

  <!-- ADD EVENT FORM -->
  <div class="card">
    <h3>Add Event</h3>

    <div style="display:flex; flex-direction:column; gap:10px;">

      <input type="date" id="dateInput">
      <input type="time" id="timeInput">
      <input type="text" id="locationInput" placeholder="Location (City, Venue)">
      <input type="text" id="notesInput" placeholder="Notes (optional)">

      <button onclick="addEvent()">Add Event</button>

    </div>
  </div>

  <!-- EVENTS LIST -->
  <div id="scheduleList"></div>

</main>

<script>
const scheduleList = document.getElementById("scheduleList");

// LOAD ON START
function renderEvents() {
  let events = JSON.parse(localStorage.getItem("events")) || [];

  scheduleList.innerHTML = "";

  events.sort((a, b) => new Date(a.date) - new Date(b.date));

  events.forEach((e, index) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${e.date}</strong> ${e.time ? "— " + e.time : ""}<br>
      <div>${e.location}</div>
      ${e.notes ? `<small>${e.notes}</small>` : ""}

      <br><br>
      <button onclick="deleteEvent(${index})">Delete</button>
    `;

    scheduleList.appendChild(div);
  });
}

// ADD EVENT
function addEvent() {
  const date = document.getElementById("dateInput").value;
  const time = document.getElementById("timeInput").value;
  const location = document.getElementById("locationInput").value;
  const notes = document.getElementById("notesInput").value;

  if (!date || !location) {
    alert("Please enter at least a date and location.");
    return;
  }

  let events = JSON.parse(localStorage.getItem("events")) || [];

  events.push({
    date,
    time,
    location,
    notes
  });

  localStorage.setItem("events", JSON.stringify(events));

  renderEvents();

  // clear inputs
  document.getElementById("dateInput").value = "";
  document.getElementById("timeInput").value = "";
  document.getElementById("locationInput").value = "";
  document.getElementById("notesInput").value = "";
}

// DELETE EVENT
function deleteEvent(index) {
  let events = JSON.parse(localStorage.getItem("events")) || [];

  events.splice(index, 1);

  localStorage.setItem("events", JSON.stringify(events));

  renderEvents();
}

// INIT
renderEvents();
</script>

</body>
</html>
