<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Contacts | TourSync</title>

  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>

  <!-- LOGIN GUARD -->
  <script>
    const user = JSON.parse(localStorage.getItem("tourCurrentUser"));
    if (!user) window.location.href = "login.html";
  </script>
</head>

<body>

<!-- =========================
     TOPBAR (MATCH DASHBOARD)
========================= -->
<header class="topbar">

  <h1>TourSync</h1>

  <nav>
    <a href="index.html">Dashboard</a>
    <a href="schedule.html">Schedule</a>
    <a href="tasks.html">Tasks</a>
    <a href="contacts.html">Contacts</a>
    <a href="messages.html">Messages</a>
  </nav>

  <button class="logout-btn" onclick="logout()">Logout</button>

</header>
<main class="container">

  <!-- PAGE TITLE -->
  <div class="page-title card">
    <h2>Contacts</h2>
    <p>Manage your tour team contacts</p>
  </div>

  <!-- CONTACT FORM -->
  <div class="card contact-form">

    <input id="firstName" type="text" placeholder="First Name">
    <input id="lastName" type="text" placeholder="Last Name">
    <input id="phone" type="text" placeholder="Phone Number">
    <input id="email" type="email" placeholder="Email">

    <input type="hidden" id="editId">

    <button onclick="addContact()">Save Contact</button>

  </div>

  <!-- SEARCH (FIXED ID MATCH) -->
  <div class="card">
    <input
      id="contactSearch"
      type="text"
      oninput="renderContactPicker()"
      placeholder="Search contacts..."
    >
  </div>

  <!-- CONTACT LIST -->
  <div class="card">
    <ul id="contactList"></ul>
  </div>

</main>

</body>
</html>
