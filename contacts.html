<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contacts</title>

  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>

<header class="topbar">

  <h1>TourSync</h1>

  <nav>
    <a href="index.html">Dashboard</a>
    <a href="schedule.html">Schedule</a>
    <a href="tasks.html">Tasks</a>
    <a href="contacts.html">Contacts</a>
    <a href="messages.html">Messages</a>
  </nav>

</header>

<main class="container contacts-layout">

  <!-- LEFT: CONTACT LIST -->
  <section class="contacts-left">

    <div class="page-header">
      <h2>Contacts</h2>
      <p class="subtitle">Manage artists, venues, managers, and crew</p>
    </div>

    <div class="contact-card">

      <div class="contact-form">

        <input id="firstName" class="input" placeholder="First Name">
        <input id="lastName" class="input" placeholder="Last Name">
        <input id="phone" class="input" placeholder="Phone">
        <input id="email" class="input" placeholder="Email">

      </div>

      <button type="button" class="btn btn-primary" onclick="addContact()">
        + Add Contact
      </button>

    </div>

    <div class="search-bar">
      <input class="input" id="searchInput" placeholder="Search contacts...">
    </div>

    <ul id="contactList"></ul>

  </section>

  <!-- RIGHT: CONTACT DETAIL PANEL -->
  <section class="contacts-right">

    <div id="contactPanel">

      <div id="contactDetails" class="empty-state">
        Select a contact to view details
      </div>

    </div>

  </section>

</main>
</body>
</html>
